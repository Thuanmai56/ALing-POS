<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>阿玲越南小吃 Dashboard (Legacy)</title>
  <style>
    :root {
      --primary: #00b900;
      --brand-yellow: #ffcc00;
      --brand-red: #d32f2f;
      --bg: #f0f2f5;
      --card: #ffffff;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: var(--bg);
    }

    .app {
      height: 100vh;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
    }

    .topbar {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      background: var(--card);
      border-bottom: 1px solid #eee;
    }

    .brand {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: baseline;
      align-items: baseline;
      gap: 10px;
    }

    .brand-title {
      font-weight: bold;
      font-size: 22px;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 15px;
      font-weight: bold;
    }

    .tabs {
      display: -webkit-flex;
      display: flex;
      gap: 10px;
      -webkit-align-items: center;
      align-items: center;
    }

    .tab {
      border: 1px solid var(--border);
      background: #fff;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }

    .tab.active {
      border-color: var(--primary);
      color: var(--primary);
      border-width: 2px;
    }

    .mini-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: #111827;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }

    .content {
      -webkit-flex: 1;
      flex: 1;
      min-height: 0;
      padding: 14px 16px;
    }

    .split {
      display: -webkit-flex;
      display: flex;
      gap: 14px;
      height: 100%;
    }

    .split > .panel {
      -webkit-flex: 1;
      flex: 1;
    }

    .panel {
      background: var(--card);
      border: 1px solid #eee;
      border-radius: 16px;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 18px;
      border-bottom: 1px solid #eee;
      display: -webkit-flex;
      display: flex;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      -webkit-align-items: center;
      align-items: center;
    }

    .panel-title {
      font-weight: bold;
      font-size: 20px;
    }

    .panel-sub {
      color: var(--muted);
      font-size: 14px;
      font-weight: bold;
      margin-top: 4px;
    }

    .panel-body {
      padding: 12px;
      overflow: auto;
      min-height: 0;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      gap: 12px;
    }

    .badge {
      display: -webkit-inline-flex;
      display: inline-flex;
      -webkit-align-items: center;
      align-items: center;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
      background: #f3f4f6;
      color: #111827;
    }

    .badge.new {
      background: rgba(211, 47, 47, 0.12);
      color: var(--brand-red);
    }

    .badge.wait {
      background: rgba(255, 204, 0, 0.18);
      color: #7a5a00;
    }

    .badge.done {
      background: rgba(0, 185, 0, 0.12);
      color: var(--primary);
    }

    .tile {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: -webkit-flex;
      display: flex;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      gap: 14px;
      cursor: pointer;
      background: #fff;
    }

    .tile.new {
      border-color: rgba(211, 47, 47, 0.35);
      -webkit-box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.08) inset;
      box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.08) inset;
    }

    .tile-top {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-wrap: wrap;
      flex-wrap: wrap;
      gap: 10px 12px;
      -webkit-align-items: baseline;
      align-items: baseline;
    }

    .tile-customer {
      font-weight: bold;
      font-size: 18px;
    }

    .tile-meta {
      color: var(--muted);
      font-size: 14px;
      font-weight: bold;
    }

    .tile-items {
      margin-top: 8px;
      color: #111827;
      font-size: 16px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: pre-line;
    }

    .tile-actions {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      gap: 10px;
      -webkit-justify-content: center;
      justify-content: center;
      min-width: 140px;
    }

    .btn {
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      -webkit-transition: opacity 0.2s ease;
      transition: opacity 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-yellow {
      background: var(--brand-yellow);
      color: #1f2937;
    }

    .btn-danger {
      background: var(--brand-red);
      color: #fff;
    }

    .btn-ghost {
      background: #f3f4f6;
      color: #111827;
    }

    .btn-block {
      width: 100%;
    }

    /* Fullscreen new order alert */
    .new-alert {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 2000;
      display: none;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      background: -webkit-linear-gradient(135deg, rgba(211, 47, 47, 0.97), rgba(255, 204, 0, 0.92));
      background: linear-gradient(135deg, rgba(211, 47, 47, 0.97), rgba(255, 204, 0, 0.92));
      padding: 20px;
      text-align: center;
    }

    .new-alert-box {
      width: 96vw;
      max-width: 680px;
      background: rgba(255, 255, 255, 0.92);
      border: 2px solid rgba(255, 255, 255, 0.55);
      border-radius: 22px;
      padding: 22px;
      -webkit-box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .new-alert-title {
      font-size: 34px;
      font-weight: bold;
      margin: 0;
      color: #111827;
    }

    .new-alert-sub {
      margin-top: 10px;
      color: #111827;
      font-weight: bold;
      font-size: 14px;
      opacity: 0.75;
    }

    .new-alert-actions {
      margin-top: 16px;
    }

    .new-alert-actions .btn {
      display: block;
      width: 100%;
      margin-bottom: 10px;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 2100;
      -webkit-justify-content: center;
      justify-content: center;
      -webkit-align-items: center;
      align-items: center;
      padding: 20px;
    }

    .modal-content {
      background: #fff;
      border-radius: 20px;
      width: 96vw;
      max-width: 860px;
      max-height: 88vh;
      overflow: auto;
      padding: 24px;
    }

    .modal-title {
      display: -webkit-flex;
      display: flex;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      -webkit-align-items: center;
      align-items: center;
      gap: 12px;
    }

    .modal-title h3 {
      margin: 0;
      font-weight: bold;
      font-size: 28px;
    }

    .modal-close {
      cursor: pointer;
      font-weight: bold;
      font-size: 26px;
      padding: 10px 18px;
      border-radius: 12px;
      background: #f3f4f6;
    }

    .detail-grid {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-wrap: wrap;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 18px;
    }

    .detail-box {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      background: #fff;
      -webkit-flex: 1 1 40%;
      flex: 1 1 40%;
      min-width: 120px;
    }

    .detail-label {
      color: var(--muted);
      font-size: 16px;
      font-weight: bold;
    }

    .detail-value {
      margin-top: 10px;
      font-size: 24px;
      font-weight: bold;
      color: #111827;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-weight: bold;
      font-size: 26px;
    }

    .detail-lines {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      gap: 12px;
      margin-top: 18px;
    }

    .detail-line {
      padding: 16px;
      border: 1px solid rgba(229, 231, 235, 0.9);
      border-radius: 14px;
      background: #fff;
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 24px;
    }

    .detail-line.primary {
      border-color: rgba(0, 185, 0, 0.25);
      background: rgba(0, 185, 0, 0.05);
      font-weight: bold;
    }

    .modal-actions {
      margin-top: 12px;
      display: -webkit-flex;
      display: flex;
      gap: 10px;
    }

    .modal-actions .btn {
      -webkit-flex: 1;
      flex: 1;
    }

    .modal-actions.two .btn {
      -webkit-flex: 1;
      flex: 1;
    }

    .checkbox-grid {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-wrap: wrap;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 16px;
    }

    .checkbox-label {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      gap: 12px;
      font-size: 22px;
      cursor: pointer;
      color: #111827;
      font-weight: bold;
      width: 30%;
    }

    .checkbox-label input {
      width: 32px;
      height: 32px;
      margin: 0;
      cursor: pointer;
    }

    @media (max-width: 700px) {
      .split {
        -webkit-flex-direction: column;
        flex-direction: column;
      }
      .tile-actions {
        min-width: 120px;
      }
      .checkbox-label {
        width: 45%;
      }
    }
  </style>
</head>

<body>

  <!-- ====== LOGIN OVERLAY ====== -->
  <div id="auth-overlay"
    style="display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:-webkit-linear-gradient(135deg,#1a1a2e 0%,#16213e 100%); background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%); z-index:99999; -webkit-align-items:center; align-items:center; -webkit-justify-content:center; justify-content:center; display:none;">
    <div
      style="background:#fff; border-radius:24px; padding:40px 32px; width:90%; max-width:340px; text-align:center; -webkit-box-shadow:0 24px 80px rgba(0,0,0,0.5); box-shadow:0 24px 80px rgba(0,0,0,0.5);">
      <div style="font-size:52px; margin-bottom:12px;">🔐</div>
      <div style="font-size:22px; font-weight:900; color:#111; margin-bottom:4px;">阿玲越南小吃 後台</div>
      <div style="font-size:13px; color:#999; margin-bottom:28px;">請輸入密碼以進入</div>
      <input type="password" id="auth-pw-input" placeholder="密碼"
        style="width:100%; padding:14px; border:2px solid #e5e7eb; border-radius:12px; font-size:18px; text-align:center; outline:none; font-family:inherit; -webkit-box-sizing:border-box; box-sizing:border-box; letter-spacing:4px;"
        onkeydown="if(event.keyCode===13) doLogin()">
      <div id="auth-error" style="color:#d32f2f; font-size:13px; font-weight:800; margin-top:10px; min-height:18px;">
      </div>
      <button onclick="doLogin()" id="auth-login-btn"
        style="width:100%; margin-top:14px; background:var(--primary); color:white; border:none; padding:16px; border-radius:12px; font-size:16px; font-weight:900; cursor:pointer;">
        進入 →
      </button>
    </div>
  </div>

  <!-- ====== SETTINGS MODAL ====== -->
  <div id="settings-modal"
    style="display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.6); z-index:9998; -webkit-align-items:center; align-items:center; -webkit-justify-content:center; justify-content:center;">
    <div
      style="background:#fff; border-radius:20px; padding:28px; width:90%; max-width:400px; -webkit-box-shadow:0 12px 40px rgba(0,0,0,0.3); box-shadow:0 12px 40px rgba(0,0,0,0.3);">
      <div style="display:-webkit-flex; display:flex; -webkit-justify-content:space-between; justify-content:space-between; -webkit-align-items:center; align-items:center; margin-bottom:20px;">
        <span style="font-size:18px; font-weight:900;">⚙️ 設定</span>
        <span onclick="closeSettings()" style="cursor:pointer; font-size:22px; color:#999;">✕</span>
      </div>

      <!-- Change Password -->
      <div style="background:#f9fafb; border-radius:14px; padding:16px; margin-bottom:14px;">
        <div style="font-weight:900; font-size:15px; margin-bottom:12px;">🔑 更換密碼</div>
        <input type="password" id="chpw-current" placeholder="目前密碼"
          style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:8px; font-size:14px; -webkit-box-sizing:border-box; box-sizing:border-box; font-family:inherit;">
        <input type="password" id="chpw-new" placeholder="新密碼"
          style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:8px; font-size:14px; -webkit-box-sizing:border-box; box-sizing:border-box; font-family:inherit;">
        <input type="password" id="chpw-confirm" placeholder="確認新密碼"
          style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:8px; font-size:14px; -webkit-box-sizing:border-box; box-sizing:border-box; font-family:inherit;">
        <div id="chpw-msg" style="font-size:13px; font-weight:800; min-height:16px; margin-bottom:8px;"></div>
        <button onclick="doChangePassword()"
          style="width:100%; padding:10px; background:var(--primary); color:#fff; border:none; border-radius:8px; font-weight:900; cursor:pointer; font-size:14px;">儲存新密碼</button>
      </div>

      <button onclick="doLogout()"
        style="width:100%; margin-top:14px; padding:10px; background:#fee2e2; color:#d32f2f; border:none; border-radius:10px; font-weight:900; cursor:pointer; font-size:14px;">🚪
        登出</button>
    </div>
  </div>

  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-title">🍱 阿玲越南小吃</div>
        <div class="brand-sub">Live orders</div>
      </div>
      <div class="tabs">
        <button class="tab active" id="tab-live" onclick="switchTab('live')">Live</button>
        <button class="tab" id="tab-history" onclick="switchTab('history')">歷史訂單</button>
        <button class="mini-btn" onclick="testSound()">Test Sound</button>
        <button class="mini-btn" onclick="openSettings()" style="background:#f3f4f6;">⚙️</button>
      </div>
    </div>

    <div class="content" id="view-live">
      <div class="split">
        <div class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title">準備中</div>
              <div class="panel-sub">按取餐時間排序</div>
            </div>
            <div class="badge wait" id="count-left">0</div>
          </div>
          <div class="panel-body" id="list-left">
            <div style="text-align:center; padding: 22px; color:#999;">載入中...</div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title">待領取</div>
              <div class="panel-sub">已完成</div>
            </div>
            <div class="badge done" id="count-right">0</div>
          </div>
          <div class="panel-body" id="list-right">
            <div style="text-align:center; padding: 22px; color:#999;">無</div>
          </div>
        </div>
      </div>
    </div>

    <div class="content" id="view-history" style="display:none;">
      <div class="panel" style="height: 100%;">
        <div class="panel-header">
          <div>
            <div class="panel-title">歷史訂單</div>
            <div class="panel-sub">按日期</div>
          </div>
        </div>
        <div class="panel-body" id="list-history">
          <div style="text-align:center; padding: 22px; color:#999;">載入中...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Fullscreen new order alert -->
  <div class="new-alert" id="new-alert">
    <div class="new-alert-box">
      <h1 class="new-alert-title" id="new-alert-title">1 單 新訂單</h1>
      <div class="new-alert-sub">點擊 "Review 訂單" 查看詳細並接單</div>
      <div class="new-alert-actions">
        <button class="btn btn-primary btn-block" onclick="reviewNextNewOrder()">Review 訂單</button>
        <button class="btn btn-ghost btn-block" onclick="dismissNewAlert()">稍後</button>
      </div>
    </div>
  </div>

  <!-- Review modal -->
  <div id="reviewModal" class="modal">
    <div class="modal-content">
      <div class="modal-title">
        <h3 style="display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center;">Review 訂單</h3>
        <div class="modal-close" onclick="closeModal()">✕</div>
      </div>

      <div class="detail-grid">
        <div class="detail-box">
          <div class="detail-label">訂單 / Order</div>
          <div class="detail-value mono" id="review-order-key">-</div>
        </div>
        <div class="detail-box">
          <div class="detail-label">LINE 顧客 / Buyer</div>
          <div class="detail-value" id="review-customer">-</div>
        </div>
        <div class="detail-box">
          <div class="detail-label">取餐時間</div>
          <div class="detail-value" id="review-pickup">-</div>
        </div>
        <div class="detail-box">
          <div class="detail-label">剩餘時間</div>
          <div class="detail-value" id="review-eta" style="color: var(--brand-red);">-</div>
        </div>
        <div class="detail-box">
          <div class="detail-label">狀態</div>
          <div class="detail-value" id="review-status">-</div>
        </div>
      </div>

      <div id="review-content" style="margin-top:18px;"></div>

      <div class="modal-actions" id="review-actions">
        <button class="btn btn-primary" onclick="reviewAccept(this)">接單</button>
        <button class="btn btn-yellow" onclick="reviewOpenChange()">需要更改</button>
        <button class="btn btn-danger" onclick="reviewOpenReject()">無法接單</button>
      </div>

      <div class="modal-actions" id="review-actions-accepted" style="display:none;">
        <button class="btn btn-primary" onclick="markReadyFromReview(this)">準備好了</button>
        <button class="btn btn-danger"
          onclick="if(confirm('您確定要取消此訂單嗎？不會通知客戶。')){ updateStatus(reviewingOrder.key, 'REJECTED', { reason: '取消並不回復客戶' }, this).then(function(){ closeModal(); }); }">取消訂單</button>
        <button class="btn btn-ghost" onclick="closeModal()">關閉</button>
      </div>

      <div class="modal-actions" id="review-actions-done" style="display:none;">
        <button class="btn btn-primary"
          onclick="updateStatus(reviewingOrder.key, 'PICKED_UP', {}, this).then(function(){ closeModal(); });">已取餐</button>
        <button class="btn btn-danger"
          onclick="if(confirm('您確定要取消此訂單嗎？不會通知客戶。')){ updateStatus(reviewingOrder.key, 'REJECTED', { reason: '取消並不回復客戶' }, this).then(function(){ closeModal(); }); }">取消訂單</button>
        <button class="btn btn-ghost" onclick="closeModal()">關閉</button>
      </div>

      <div class="modal-actions" id="review-actions-waiting" style="display:none;">
        <button class="btn btn-primary" onclick="reviewAccept(this)">接單</button>
        <button class="btn btn-danger" onclick="reviewForceCancel(this)">取消訂單</button>
        <button class="btn btn-ghost" onclick="closeModal()">關閉</button>
      </div>
    </div>
  </div>

  <!-- Change modal -->
  <div id="changeModal" class="modal">
    <div class="modal-content">
      <div class="modal-title">
        <h3>需要更改</h3>
        <div class="modal-close" onclick="closeModal()">✕</div>
      </div>
      <label style="display:block; margin-top: 10px; font-weight: bold; font-size: 20px;">原因 / 建議:</label>
      <select id="change-reason"
        style="width:100%; padding: 16px; margin-top: 10px; border-radius: 12px; border: 1px solid var(--border); font-size: 22px;"
        onchange="onChangeReasonChange()">
        <option value="時間需調整">時間太趕，需延後</option>
        <option value="口味售完">該口味已售完</option>
      </select>
      <textarea id="change-note" rows="3" placeholder="建議時間 (例如: 11:00)"
        style="width:100%; padding: 16px; margin-top: 16px; border-radius: 12px; border: 1px solid var(--border); font-size: 22px;"></textarea>

      <div id="change-items-div" style="display: none;">
        <div style="margin-top: 16px; font-weight: bold; font-size: 18px; margin-bottom: 12px;">選擇已售完或缺貨的品項 :</div>

        <div style="font-weight: 900; font-size: 16px; margin-bottom: 8px; color: #555;">🍞 麵包 / 餅皮</div>
        <div class="checkbox-grid" style="margin-top: 0; margin-bottom: 16px;">

          <label class="checkbox-label"><input type="checkbox" value="蛋餅" class="sold-item"> 蛋餅</label>
          <label class="checkbox-label"><input type="checkbox" value="蔥抓餅" class="sold-item"> 蔥抓餅</label>

        <div style="font-weight: 900; font-size: 16px; margin-bottom: 8px; color: #555;">🥩 主食 / 肉類</div>

          <label class="checkbox-label"><input type="checkbox" value="煎蛋" class="sold-item"> 煎蛋</label>
          <label class="checkbox-label"><input type="checkbox" value="火腿" class="sold-item"> 火腿</label>
          <label class="checkbox-label"><input type="checkbox" value="香雞" class="sold-item"> 香雞</label>
          <label class="checkbox-label"><input type="checkbox" value="培根" class="sold-item"> 培根</label>
          <label class="checkbox-label"><input type="checkbox" value="豬排" class="sold-item"> 豬排</label>
          <label class="checkbox-label"><input type="checkbox" value="厚牛" class="sold-item"> 厚牛</label>
          <label class="checkbox-label"><input type="checkbox" value="卡拉雞" class="sold-item"> 卡拉雞</label>

        <div style="font-weight: 900; font-size: 16px; margin-bottom: 8px; color: #555;">🍝 麵類 / 飯類 / 沙拉</div>
        <div class="checkbox-grid" style="margin-top: 0; margin-bottom: 16px;">
          <label class="checkbox-label"><input type="checkbox" value="義大利麵" class="sold-item"> 義大利麵</label>
          <label class="checkbox-label"><input type="checkbox" value="燉飯" class="sold-item"> 燉飯</label>
          <label class="checkbox-label"><input type="checkbox" value="蛋包飯" class="sold-item"> 蛋包飯</label>
          <label class="checkbox-label"><input type="checkbox" value="炒泡麵" class="sold-item"> 炒泡麵</label>
          <label class="checkbox-label"><input type="checkbox" value="沙拉" class="sold-item"> 沙拉</label>
          <label class="checkbox-label"><input type="checkbox" value="鬆餅" class="sold-item"> 鬆餅</label>
        </div>

        <div style="font-weight: 900; font-size: 16px; margin-bottom: 8px; color: #555;">🥤 飲品 &amp; 加料</div>
        <div class="checkbox-grid" style="margin-top: 0;">
          <label class="checkbox-label"><input type="checkbox" value="起司" class="sold-item"> 起司</label>
          <label class="checkbox-label"><input type="checkbox" value="豆漿" class="sold-item"> 豆漿</label>
          <label class="checkbox-label"><input type="checkbox" value="紅茶" class="sold-item"> 紅茶</label>
          <label class="checkbox-label"><input type="checkbox" value="咖啡" class="sold-item"> 咖啡</label>
          <label class="checkbox-label"><input type="checkbox" value="奶茶" class="sold-item"> 奶茶</label>
          <label class="checkbox-label"><input type="checkbox" value="果醬" class="sold-item"> 果醬</label>
        </div>

      <div class="modal-actions two" style="margin-top: 16px;">
        <button class="btn btn-yellow" onclick="confirmAction('CHANGE', this)">傳送建議</button>
        <button class="btn btn-ghost" onclick="closeModal()">取消</button>

  <!-- Reject modal -->
  <div id="rejectModal" class="modal">
    <div class="modal-content">
      <div class="modal-title">
        <h3>無法接單</h3>
        <div class="modal-close" onclick="closeModal()">✕</div>
      </div>
      <select id="reject-reason"
        style="width:100%; padding: 16px; margin-top: 16px; border-radius: 12px; border: 1px solid var(--border); font-size: 22px;">
        <option value="今日已售完">今日已售完</option>
        <option value="訂單過多">訂單過多，暫不接單</option>
        <option value="已過營業時間">已過營業時間</option>
        <option value="取消並不回復客戶">取消並不回復客戶</option>
      </select>
      <div class="modal-actions two">
        <button class="btn btn-danger" onclick="confirmAction('REJECT', this)">確認拒絕</button>
        <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      </div>
    </div>
  </div>

  <script>
    var WORKER_BASE = "https://alinh.thuanmnc.workers.dev";

    // ====== Utility: addEventListener once polyfill ======
    function addEventListenerOnce(el, type, fn) {
      function handler(e) {
        el.removeEventListener(type, handler);
        fn(e);
      }
      el.addEventListener(type, handler);
    }

    // ====== Utility: parse URL query param ======
    function getQueryParam(name) {
      var search = window.location.search;
      if (!search) return null;
      var parts = search.slice(1).split('&');
      for (var i = 0; i < parts.length; i++) {
        var kv = parts[i].split('=');
        if (decodeURIComponent(kv[0]) === name) {
          return kv.length > 1 ? decodeURIComponent(kv[1]) : '';
        }
      }
      return null;
    }

    // ====== AUTH ======
    function checkAuth() {
      var overlay = document.getElementById("auth-overlay");
      var errEl = document.getElementById("auth-error");
      overlay.style.display = "flex";

      var token = getQueryParam("t");
      if (token) {
        fetch(WORKER_BASE + "/api/auth/templink?t=" + encodeURIComponent(token) + "&_t=" + Date.now())
          .then(function(res) { return res.json(); })
          .then(function(data) {
            if (data.ok) {
              grantAccess();
            } else {
              sessionStorage.removeItem("brunch_auth");
              errEl.innerText = "此臨時連結已過期或無效";
              setTimeout(function() { document.getElementById("auth-pw-input").focus(); }, 100);
            }
          })
          .catch(function(e) { console.error("Auth check failed", e); });
        return;
      }

      if (sessionStorage.getItem("brunch_auth") === "1") {
        grantAccess();
        return;
      }

      setTimeout(function() { document.getElementById("auth-pw-input").focus(); }, 100);
    }

    function grantAccess() {
      sessionStorage.setItem("brunch_auth", "1");
      document.getElementById("auth-overlay").style.display = "none";
      // Start main app
      setInterval(fetchOrders, 1500);
      fetchOrders();
    }

    function doLogin() {
      var pw = document.getElementById("auth-pw-input").value;
      var errEl = document.getElementById("auth-error");
      var btn = document.getElementById("auth-login-btn");
      if (!pw) { errEl.innerText = "請輸入密碼"; return; }
      btn.innerText = "驗證中..."; btn.disabled = true;
      fetch(WORKER_BASE + "/api/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pw })
      })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data.ok) { grantAccess(); }
          else { errEl.innerText = "密碼錯誤，請重試"; document.getElementById("auth-pw-input").value = ""; }
        })
        .catch(function() { errEl.innerText = "網路錯誤，請重試"; })
        .then(function() { btn.innerText = "進入 →"; btn.disabled = false; });
    }

    function doLogout() {
      sessionStorage.removeItem("brunch_auth");
      window.location.reload();
    }

    function openSettings() {
      var m = document.getElementById("settings-modal");
      m.style.display = "flex";
      ["chpw-current", "chpw-new", "chpw-confirm"].forEach(function(id) { document.getElementById(id).value = ""; });
      document.getElementById("chpw-msg").innerText = "";
    }
    function closeSettings() { document.getElementById("settings-modal").style.display = "none"; }

    function doChangePassword() {
      var current = document.getElementById("chpw-current").value;
      var newPw = document.getElementById("chpw-new").value;
      var confirmPw = document.getElementById("chpw-confirm").value;
      var msg = document.getElementById("chpw-msg");
      if (!current || !newPw) { msg.style.color = "#d32f2f"; msg.innerText = "請填寫所有欄位"; return; }
      if (newPw !== confirmPw) { msg.style.color = "#d32f2f"; msg.innerText = "新密碼不一致"; return; }
      if (newPw.length < 4) { msg.style.color = "#d32f2f"; msg.innerText = "密碼至少4碼"; return; }
      fetch(WORKER_BASE + "/api/auth/change", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ current: current, newPassword: newPw })
      })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data.ok) { msg.style.color = "#00b900"; msg.innerText = "密碼已更新！"; }
          else { msg.style.color = "#d32f2f"; msg.innerText = data.error || "失敗"; }
        })
        .catch(function() { msg.style.color = "#d32f2f"; msg.innerText = "網路錯誤"; });
    }

    // Run auth check on page load
    checkAuth();

    // ====== Main App State ======
    var latestOrders = [];
    var pendingNewOrders = [];
    var reviewingOrder = null;
    var currentOrderKey = null;
    var activeTab = "live";
    var newAlertSnoozeUntilMs = 0;
    var snoozedNewOrderKeys = {};
    var localOverrides = {};
    var historyExpandedDates = {};
    var historyInitialized = false;

    var knownOrderKeys = {};
    var processingKeys = {};
    var isFirstLoad = true;
    var soundUnlocked = false;
    var audioCtx = null;
    var alarmIntervalId = null;
    var alarmTimeoutIds = [];

    // Unlock audio after a user gesture
    function unlockSound() {
      soundUnlocked = true;
      try {
        var AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextCtor) return;
        if (!audioCtx) audioCtx = new AudioContextCtor();
        if (audioCtx.state === "suspended") {
          audioCtx.resume();
        }
      } catch (e) {
        console.error("unlockSound failed:", e);
      }
    }

    addEventListenerOnce(document, "click", unlockSound);
    addEventListenerOnce(document, "touchstart", unlockSound);
    addEventListenerOnce(document, "keydown", unlockSound);

    function escapeHtml(s) {
      return String(s !== null && s !== undefined ? s : "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function parsePickupTimeMs(timeStr) {
      if (!timeStr || typeof timeStr !== "string") return NaN;
      var m = timeStr.match(/^(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2})/);
      if (!m) return NaN;
      var iso = m[1] + "T" + m[2] + ":00";
      var ms = new Date(iso).getTime();
      return isNaN(ms) ? NaN : ms;
    }

    function sortByPickupTimeAsc(a, b) {
      var at = parsePickupTimeMs(a && a.time);
      var bt = parsePickupTimeMs(b && b.time);
      if (isNaN(at) || isNaN(bt)) return ((a && a.createdAt) || 0) - ((b && b.createdAt) || 0);
      return at - bt;
    }

    function formatEta(timeStr) {
      var target = parsePickupTimeMs(timeStr);
      if (isNaN(target)) return "-";
      var diffMs = target - Date.now();
      var diffMin = Math.round(diffMs / 60000);
      if (diffMin <= 0) return "已到 / " + Math.abs(diffMin) + " 分鐘前";
      if (diffMin < 60) return "剩 " + diffMin + " 分鐘";
      var h = Math.floor(diffMin / 60);
      var m = diffMin % 60;
      return "剩 " + h + " 小時 " + m + " 分";
    }

    function shortItems(content) {
      if (!content) return "";
      var lines = String(content).split("\n").map(function(s) { return s.trim(); }).filter(Boolean);
      return lines.slice(0, 6).join("\n");
    }

    function switchTab(tab) {
      activeTab = tab;
      document.getElementById("tab-live").classList.toggle("active", tab === "live");
      document.getElementById("tab-history").classList.toggle("active", tab === "history");
      document.getElementById("view-live").style.display = tab === "live" ? "block" : "none";
      document.getElementById("view-history").style.display = tab === "history" ? "block" : "none";
      renderAll();
    }

    function fetchOrders() {
      fetch(WORKER_BASE + "/api/orders?_t=" + Date.now())
        .then(function(response) {
          if (!response.ok) throw new Error("fetch failed: " + response.status);
          return response.json();
        })
        .then(function(orders) {
          if (!Array.isArray(orders)) orders = [];

          // Deduplicate
          var uniqueMap = {};
          orders.forEach(function(o) { if (o && o.key) uniqueMap[o.key] = o; });
          latestOrders = Object.keys(uniqueMap).map(function(k) { return uniqueMap[k]; });

          // New arrivals => sound
          var newArrivals = latestOrders.filter(function(o) { return o && o.key && !knownOrderKeys[o.key]; });
          newArrivals.forEach(function(o) { if (o && o.key) knownOrderKeys[o.key] = true; });

          // NEW orders => fullscreen alert
          pendingNewOrders = latestOrders.filter(function(o) { return o && o.status === "NEW"; }).slice().sort(sortByPickupTimeAsc);
          if (!isFirstLoad && newArrivals.length > 0 && pendingNewOrders.length > 0) {
            startContinuousAlarm();
          }
          isFirstLoad = false;
          updateNewAlert();
          renderAll();
        })
        .catch(function(e) {
          console.error(e);
          var msg = (e && e.message) || String(e);
          document.getElementById("list-left").innerHTML = '<div style="text-align:center; padding: 22px; color:#d32f2f;">無法載入: ' + escapeHtml(msg) + '</div>';
          document.getElementById("list-right").innerHTML = '<div style="text-align:center; padding: 22px; color:#d32f2f;">無法載入</div>';
          document.getElementById("list-history").innerHTML = '<div style="text-align:center; padding: 22px; color:#d32f2f;">無法載入</div>';
        });
    }

    function renderAll() {
      if (!Array.isArray(latestOrders)) return;

      var now = Date.now();
      var currentOrders = latestOrders.map(function(o) {
        var override = localOverrides[o.key];
        if (override && (now - override.time < 15000)) {
          var merged = Object.assign({}, o);
          merged.status = override.status;
          return merged;
        }
        if (override && (now - override.time >= 15000)) {
          delete localOverrides[o.key];
        }
        return o;
      });

      var leftOrders = currentOrders
        .filter(function(o) { return o && (o.status === "NEW" || o.status === "ACCEPTED" || o.status === "WAITING_CUSTOMER_CHANGE" || o.status === "WAITING_CUSTOMER_REJECT"); })
        .slice()
        .sort(sortByPickupTimeAsc);

      var rightOrders = currentOrders
        .filter(function(o) { return o && o.status === "DONE"; })
        .slice()
        .sort(sortByPickupTimeAsc);

      var historyOrders = currentOrders
        .filter(function(o) { return o && (o.status === "PICKED_UP" || o.status === "REJECTED"); })
        .slice()
        .sort(function(a, b) { return ((b && b.createdAt) || 0) - ((a && a.createdAt) || 0); });

      document.getElementById("count-left").innerText = String(leftOrders.length);
      document.getElementById("count-right").innerText = String(rightOrders.length);

      if (activeTab === "live") {
        renderListLeft(leftOrders);
        renderListRight(rightOrders);
      } else {
        renderHistory(historyOrders);
      }
    }

    function renderListLeft(orders) {
      var container = document.getElementById("list-left");
      container.innerHTML = "";
      if (orders.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding: 22px; color:#999;">無</div>';
        return;
      }

      orders.forEach(function(order) {
        var isNew = order.status === "NEW";
        var eta = formatEta(order.time);

        var tile = document.createElement("div");
        tile.className = "tile" + (isNew ? " new" : "");
        tile.onclick = (function(key) { return function() { openReview(key); }; })(order.key);

        var badge = "";
        var rightActions = "";

        if (isNew) {
          badge = '<span class="badge new">NEW</span>';
          rightActions = '<button class="btn btn-ghost btn-block" onclick="event.stopPropagation(); openReview(\'' + escapeHtml(order.key) + '\')">Review</button>';
        } else if (order.status === "ACCEPTED") {
          badge = '<span class="badge wait">DOING</span>';
          rightActions = '<button class="btn btn-primary btn-block" onclick="event.stopPropagation(); updateStatus(\'' + escapeHtml(order.key) + '\',\'DONE\', {}, this)">準備完成</button>';
        } else {
          badge = '<span class="badge wait" style="background:#e5e7eb; color:#4b5563;">等客戶確認</span>';
          rightActions = '<button class="btn btn-block" style="background:#f3f4f6; color:#9ca3af; cursor:not-allowed;" disabled>等待回覆</button>';
        }

        tile.innerHTML = '<div style="-webkit-flex:1; flex:1;">' +
          '<div class="tile-top">' +
          '<span class="tile-customer">' + escapeHtml(order.customer || "客戶") + '</span>' +
          badge +
          '<span class="tile-meta">#' + escapeHtml(order.key) + '</span>' +
          '</div>' +
          '<div class="tile-top" style="margin-top: 6px;">' +
          '<span class="tile-meta">取餐: ' + escapeHtml(order.time || "-") + '</span>' +
          '<span class="tile-meta" style="color: var(--brand-red); font-weight: bold;">' + escapeHtml(eta) + '</span>' +
          '</div>' +
          '<div class="tile-items">' + escapeHtml(shortItems(order.content)) + '</div>' +
          '</div>' +
          '<div class="tile-actions">' + rightActions + '</div>';

        container.appendChild(tile);
      });
    }

    function renderListRight(orders) {
      var container = document.getElementById("list-right");
      container.innerHTML = "";
      if (orders.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding: 22px; color:#999;">無</div>';
        return;
      }

      orders.forEach(function(order) {
        var eta = formatEta(order.time);
        var tile = document.createElement("div");
        tile.className = "tile";
        tile.onclick = (function(key) { return function() { openReview(key); }; })(order.key);

        tile.innerHTML = '<div style="-webkit-flex:1; flex:1;">' +
          '<div class="tile-top">' +
          '<span class="tile-customer">' + escapeHtml(order.customer || "客戶") + '</span>' +
          '<span class="badge done">READY</span>' +
          '<span class="tile-meta">#' + escapeHtml(order.key) + '</span>' +
          '</div>' +
          '<div class="tile-top" style="margin-top: 6px;">' +
          '<span class="tile-meta">取餐: ' + escapeHtml(order.time || "-") + '</span>' +
          '<span class="tile-meta" style="color: var(--brand-red); font-weight: bold;">' + escapeHtml(eta) + '</span>' +
          '</div>' +
          '<div class="tile-items">' + escapeHtml(shortItems(order.content)) + '</div>' +
          '</div>' +
          '<div class="tile-actions">' +
          '<button class="btn btn-yellow btn-block" onclick="event.stopPropagation(); updateStatus(\'' + escapeHtml(order.key) + '\',\'PICKED_UP\', {}, this)">已取餐</button>' +
          '</div>';
        container.appendChild(tile);
      });
    }

    function groupByDate(orders) {
      var map = {};
      orders.forEach(function(o) {
        var d = "Unknown";
        if (o.createdAt) {
          var dt = new Date(o.createdAt);
          var nowTaiwan = new Date(dt.getTime() + 8 * 3600000);
          var yyyy = nowTaiwan.getUTCFullYear();
          var mm = String(nowTaiwan.getUTCMonth() + 1);
          if (mm.length < 2) mm = "0" + mm;
          var dd = String(nowTaiwan.getUTCDate());
          if (dd.length < 2) dd = "0" + dd;
          d = yyyy + "-" + mm + "-" + dd;
        } else if (o && o.time && typeof o.time === "string" && o.time.match(/^\d{4}-\d{2}-\d{2}/)) {
          d = o.time.slice(0, 10);
        }
        if (!map[d]) map[d] = [];
        map[d].push(o);
      });
      return map;
    }

    function renderHistory(orders) {
      var container = document.getElementById("list-history");
      container.innerHTML = "";
      if (orders.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding: 22px; color:#999;">歷史訂單無</div>';
        return;
      }

      var grouped = groupByDate(orders);
      var sortedDates = Object.keys(grouped).sort(function(a, b) { return b.localeCompare(a); });

      if (!historyInitialized && sortedDates.length > 0) {
        historyExpandedDates[sortedDates[0]] = true;
        historyInitialized = true;
      }

      sortedDates.forEach(function(date, dateIdx) {
        var items = grouped[date];
        items.sort(function(a, b) {
          var timeA = a.pickedUpAt || a.createdAt || 0;
          var timeB = b.pickedUpAt || b.createdAt || 0;
          return timeB - timeA;
        });

        var isExpanded = !!historyExpandedDates[date];
        var totalOrders = items.length;
        var revenue = items.reduce(function(sum, o) { return sum + (parseInt(o.total) || 0); }, 0);

        var headerRow = document.createElement("div");
        headerRow.style.cssText = "display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; -webkit-justify-content:space-between; justify-content:space-between; padding:12px 14px; margin-bottom:6px; border-radius:12px; background:#f3f4f6; cursor:pointer;";
        headerRow.innerHTML = '<div style="display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; gap:10px; -webkit-flex-wrap:wrap; flex-wrap:wrap;">' +
          '<span style="font-size:17px; font-weight:900; color:#111;">' + escapeHtml(date) + '</span>' +
          '<span style="font-size:13px; font-weight:800; background:rgba(0,0,0,0.1); padding:2px 8px; border-radius:99px;">' + totalOrders + ' 單</span>' +
          (revenue > 0 ? '<span style="font-size:13px; font-weight:900; color:var(--brand-red);">營收 $' + revenue + '</span>' : '') +
          '</div>' +
          '<span class="toggle-icon" style="font-size:18px;">' + (isExpanded ? '▲' : '▼') + '</span>';
        container.appendChild(headerRow);

        var listWrap = document.createElement("div");
        listWrap.style.display = isExpanded ? "block" : "none";

        items.forEach(function(order) {
          var tile = document.createElement("div");
          tile.className = "tile";
          tile.onclick = (function(key) { return function() { openReview(key); }; })(order.key);
          var badgeHtml = order.status === "PICKED_UP"
            ? '<span class="badge done">PICKED</span>'
            : '<span class="badge" style="background:#fee2e2;color:#b91c1c;">' + escapeHtml(order.status) + '</span>';

          tile.innerHTML = '<div style="-webkit-flex:1; flex:1; min-width:0;">' +
            '<div class="tile-top">' +
            '<span class="tile-customer">' + escapeHtml(order.customer || "客戶") + '</span>' +
            badgeHtml +
            '<span class="tile-meta">#' + escapeHtml(order.key) + '</span>' +
            '</div>' +
            '<div style="display:-webkit-flex; display:flex; gap:12px; margin-top:4px;">' +
            '<span class="tile-meta">取餐: ' + escapeHtml(order.time || "-") + '</span>' +
            (order.total ? '<span class="tile-meta" style="color:var(--primary); font-weight:900;">$' + order.total + '</span>' : '') +
            '</div>' +
            '<div class="tile-items">' + escapeHtml(shortItems(order.content)) + '</div>' +
            '</div>' +
            '<div class="tile-actions">' +
            '<button class="btn btn-ghost btn-block" onclick="event.stopPropagation(); openReview(\'' + escapeHtml(order.key) + '\')">查看</button>' +
            '</div>';
          listWrap.appendChild(tile);
        });

        container.appendChild(listWrap);

        headerRow.addEventListener("click", (function(d, wrap, hdr) {
          return function() {
            var isOpen = wrap.style.display !== "none";
            wrap.style.display = isOpen ? "none" : "block";
            hdr.querySelector(".toggle-icon").textContent = isOpen ? "▼" : "▲";
            if (isOpen) {
              delete historyExpandedDates[d];
            } else {
              historyExpandedDates[d] = true;
            }
          };
        })(date, listWrap, headerRow));
      });
    }

    function updateNewAlert() {
      var count = pendingNewOrders.length;
      var alertEl = document.getElementById("new-alert");
      var titleEl = document.getElementById("new-alert-title");

      if (count <= 0) {
        alertEl.style.display = "none";
        newAlertSnoozeUntilMs = 0;
        snoozedNewOrderKeys = {};
        stopContinuousAlarm();
        return;
      }

      var isReviewing =
        document.getElementById("reviewModal").style.display === "flex" ||
        document.getElementById("changeModal").style.display === "flex" ||
        document.getElementById("rejectModal").style.display === "flex";

      if (Date.now() < newAlertSnoozeUntilMs || isReviewing) {
        var hasBrandNew = pendingNewOrders.some(function(o) { return o && o.key && !snoozedNewOrderKeys[o.key]; });
        if (!hasBrandNew) {
          alertEl.style.display = "none";
          stopContinuousAlarm();
          return;
        }
      }
      titleEl.innerText = count + " 單 新訂單";
      alertEl.style.display = "flex";
      startContinuousAlarm();
    }

    function dismissNewAlert() {
      newAlertSnoozeUntilMs = Date.now() + 30000;
      snoozedNewOrderKeys = {};
      pendingNewOrders.forEach(function(o) { if (o && o.key) snoozedNewOrderKeys[o.key] = true; });
      document.getElementById("new-alert").style.display = "none";
      stopContinuousAlarm();
    }

    function reviewNextNewOrder() {
      if (pendingNewOrders.length <= 0) {
        dismissNewAlert();
        return;
      }
      openReview(pendingNewOrders[0].key);
    }

    function openReview(orderKey) {
      var order = null;
      for (var i = 0; i < latestOrders.length; i++) {
        if (latestOrders[i] && latestOrders[i].key === orderKey) { order = latestOrders[i]; break; }
      }
      if (!order) return;
      reviewingOrder = order;

      if (order.status === "NEW") {
        dismissNewAlert();
      }

      document.getElementById("review-order-key").innerText = order.key || "-";
      document.getElementById("review-customer").innerText = order.customer || "-";
      document.getElementById("review-pickup").innerText = order.time || "-";
      document.getElementById("review-eta").innerText = formatEta(order.time);
      document.getElementById("review-status").innerText = order.status || "-";
      document.getElementById("review-content").innerHTML = formatContentHtml(order);

      var actionsNew = document.getElementById("review-actions");
      var actionsAccepted = document.getElementById("review-actions-accepted");
      var actionsWaiting = document.getElementById("review-actions-waiting");
      var actionsDone = document.getElementById("review-actions-done");

      actionsNew.style.display = "none";
      actionsAccepted.style.display = "none";
      actionsWaiting.style.display = "none";
      if (actionsDone) actionsDone.style.display = "none";

      if (order.status === "NEW") {
        actionsNew.style.display = "-webkit-flex";
        actionsNew.style.display = "flex";
      } else if (order.status === "ACCEPTED") {
        actionsAccepted.style.display = "-webkit-flex";
        actionsAccepted.style.display = "flex";
      } else if (order.status === "DONE") {
        if (actionsDone) { actionsDone.style.display = "-webkit-flex"; actionsDone.style.display = "flex"; }
      } else if (order.status === "WAITING_CUSTOMER_CHANGE" || order.status === "WAITING_CUSTOMER_REJECT") {
        actionsWaiting.style.display = "-webkit-flex";
        actionsWaiting.style.display = "flex";
      }

      document.getElementById("reviewModal").style.display = "flex";
    }

    function formatContentHtml(order) {
      var raw = String(order.content || "");
      if (order.reason === "Đơn qua tin nhắn") {
        return '<div class="detail-lines"><div class="detail-line primary" style="white-space: pre-wrap; display: block;">' + escapeHtml(raw) + '</div></div>';
      }
      var lines = raw.split("\n").map(function(l) { return l.slice(0, l.length - (l.length - l.trimRight().length)); }).filter(function(l) { return l.trim() !== ""; });
      if (lines.length === 0 && !order.note) return '<div class="detail-lines"><div class="detail-line">-</div></div>';

      var formattedLines = lines.map(function(line) {
        var t = line.replace(/^\s+/, "");
        var isSub = t.indexOf("-") === 0 || t.indexOf("•") === 0 || t.indexOf("－") === 0 || t.indexOf("↳") === 0;
        if (isSub) {
          return '<div style="color: #666; font-size: 16px; margin-top: 4px; padding-left: 14px;">' + escapeHtml(line) + '</div>';
        }
        return '<div style="font-weight: bold; font-size: 24px; color: #111; margin-top: 12px;">' + escapeHtml(line) + '</div>';
      }).join("");

      if (order.note) {
        formattedLines += '<div style="margin-top: 20px; padding: 12px; background: #fff9c4; border-left: 4px solid #fbc02d; border-radius: 4px;">' +
          '<div style="font-weight: bold; color: #f57f17; font-size: 16px; margin-bottom: 4px;">📝 總備註 (Ghi chú tổng):</div>' +
          '<div style="font-size: 20px; color: #333; white-space: pre-wrap;">' + escapeHtml(order.note) + '</div>' +
          '</div>';
      }

      return '<div class="detail-lines"><div class="detail-line primary" style="display:block; padding: 18px 22px;">' + formattedLines + '</div></div>';
    }

    function closeModal() {
      var modals = document.querySelectorAll(".modal");
      for (var i = 0; i < modals.length; i++) {
        modals[i].style.display = "none";
      }
    }

    function updateStatus(key, status, extra, btn) {
      extra = extra || {};
      btn = btn || null;
      if (!key) return Promise.resolve();
      if (processingKeys[key]) return Promise.resolve();
      processingKeys[key] = true;

      var oldText = btn ? btn.innerText : "";
      if (btn) {
        btn.disabled = true;
        btn.innerText = "處理中...";
      }

      var body = Object.assign({ key: key, status: status }, extra);

      return fetch(WORKER_BASE + "/api/update", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      })
        .then(function(response) {
          if (!response.ok) throw new Error("update failed: " + response.status);
          localOverrides[key] = { status: status, time: Date.now() };
          renderAll();
          return fetchOrders();
        })
        .catch(function(e) {
          console.error(e);
          alert("處理失敗，請稍後再試。");
        })
        .then(function() {
          delete processingKeys[key];
          if (btn) {
            btn.disabled = false;
            btn.innerText = oldText;
          }
        });
    }

    function reviewAccept(btn) {
      if (!(reviewingOrder && reviewingOrder.key)) return;
      updateStatus(reviewingOrder.key, "ACCEPTED", {}, btn).then(function() {
        closeModal();
        dismissNewAlert();
        switchTab("live");
      });
    }

    function reviewOpenChange() {
      if (!(reviewingOrder && reviewingOrder.key)) return;
      currentOrderKey = reviewingOrder.key;
      closeModal();
      document.getElementById("change-reason").value = "時間需調整";
      document.getElementById("change-note").value = "";
      var checkboxes = document.querySelectorAll(".sold-item");
      for (var i = 0; i < checkboxes.length; i++) { checkboxes[i].checked = false; }
      onChangeReasonChange();
      document.getElementById("changeModal").style.display = "flex";
    }

    function reviewOpenReject() {
      if (!(reviewingOrder && reviewingOrder.key)) return;
      currentOrderKey = reviewingOrder.key;
      closeModal();
      document.getElementById("reject-reason").selectedIndex = 0;
      document.getElementById("rejectModal").style.display = "flex";
    }

    function markReadyFromReview(btn) {
      if (!(reviewingOrder && reviewingOrder.key)) return;
      updateStatus(reviewingOrder.key, "DONE", {}, btn).then(function() {
        closeModal();
        switchTab("live");
      });
    }

    function reviewForceCancel(btn) {
      if (!(reviewingOrder && reviewingOrder.key)) return;
      if (!confirm("Hủy đơn hàng này do khách không phản hồi?")) return;
      updateStatus(reviewingOrder.key, "FORCE_REJECT", {}, btn).then(function() {
        closeModal();
        switchTab("live");
      });
    }

    function onChangeReasonChange() {
      var reason = document.getElementById("change-reason").value;
      var note = document.getElementById("change-note");
      var itemsDiv = document.getElementById("change-items-div");

      if (reason === "時間需調整") {
        note.style.display = "block";
        itemsDiv.style.display = "none";
        note.placeholder = "建議時間 (例如: 11:00)";
      } else {
        note.style.display = "none";
        itemsDiv.style.display = "block";
      }
    }

    function confirmAction(type, btn) {
      var key = currentOrderKey;
      var isChange = type === "CHANGE";
      var status = isChange ? "CHANGED" : "REJECTED";
      var reason = isChange ? document.getElementById("change-reason").value : document.getElementById("reject-reason").value;
      var note = isChange ? document.getElementById("change-note").value.trim() : undefined;

      if (isChange && reason === "時間需調整" && !note) {
        alert("Vui lòng nhập thời gian gợi ý mới (Ví dụ: 11:00)!");
        return;
      }

      if (isChange && reason === "口味售完") {
        var checkedEls = document.querySelectorAll(".sold-item:checked");
        var checked = [];
        for (var i = 0; i < checkedEls.length; i++) { checked.push(checkedEls[i].value); }
        if (checked.length === 0) {
          alert("Vui lòng chọn ít nhất một món đã hết!");
          return;
        }
        note = checked.join(",");
      }

      updateStatus(key, status, { reason: reason, note: note }, btn).then(function() {
        closeModal();
      });
    }

    function clearAlarmTimeouts() {
      alarmTimeoutIds.forEach(function(id) { clearTimeout(id); });
      alarmTimeoutIds = [];
    }

    function stopContinuousAlarm() {
      if (alarmIntervalId) {
        clearInterval(alarmIntervalId);
        alarmIntervalId = null;
      }
      clearAlarmTimeouts();
    }

    function playTone(frequency, durationMs, type, volume) {
      type = type || "square";
      volume = volume !== undefined ? volume : 0.22;
      if (!audioCtx || audioCtx.state !== "running") return;
      var oscillator = audioCtx.createOscillator();
      var gain = audioCtx.createGain();

      oscillator.type = type;
      oscillator.frequency.value = frequency;
      gain.gain.value = volume;

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      oscillator.start();
      setTimeout(function() { oscillator.stop(); }, durationMs);
    }

    function playAlarmCycle() {
      clearAlarmTimeouts();
      playTone(880, 250, "square", 0.22);
      alarmTimeoutIds.push(setTimeout(function() { playTone(1040, 250, "square", 0.22); }, 320));
      alarmTimeoutIds.push(setTimeout(function() { playTone(880, 320, "square", 0.24); }, 680));
    }

    function startContinuousAlarm() {
      if (!soundUnlocked) return;
      if (alarmIntervalId) return;
      playAlarmCycle();
      alarmIntervalId = setInterval(function() {
        playAlarmCycle();
      }, 2200);
    }

    function playNewOrderSound() {
      if (!soundUnlocked) return;
      try {
        var AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextCtor) return;
        if (!audioCtx) audioCtx = new AudioContextCtor();
        if (audioCtx.state === "suspended") {
          audioCtx.resume().then(function() { playAlarmCycle(); });
          return;
        }
        playAlarmCycle();
      } catch (e) {
        console.error(e);
      }
    }

    function testSound() {
      unlockSound();
      playNewOrderSound();
    }

    // Auth check runs on load; fetchOrders called after grantAccess()
  </script>
</body>
